name: Pipeline
on:
  push:
    branches:
      - '*'
  pull_request:

jobs:
  check-conventional-commits:
    uses: armakuni/github-actions/.github/workflows/check-conventional-commits.yml@v0.19.14

  run-tests:
    uses: ./.github/workflows/run-tests.yml

  bump-cargo-version:
    runs-on: ubuntu-latest
    needs:
      - check-conventional-commits
    if: github.ref == 'refs/heads/master' && needs.check-conventional-commits.outputs.will-bump == 'true'
    steps:
      - uses: tomphp/github-actions/checkout-rust-project@v0.8.1
      - name: Install cargo-edit
        run: cargo install cargo-edit
      - name: Set Cargo version
        run: cargo set-version "${NEW_VERSION#v}"
        env:
          NEW_VERSION: ${{ needs.check-conventional-commits.outputs.bump-version }}
      - name: Store updated Cargo files
        uses: actions/upload-artifact@v7
        with:
          name: bumped-files
          path: Cargo.*

  build-binaries:
    if: github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.os }}
    needs:
      - bump-cargo-version
      - run-tests
    steps:
      - name: "workaround: Add rustup bin to PATH"
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH
          brew --prefix rustup 2>/dev/null && echo "$(brew --prefix rustup)/bin" >> $GITHUB_PATH || true
      - name: "workaround: Remove cached x86_64 rustup from PATH on ARM Linux"
        if: runner.arch == 'ARM64' && runner.os == 'Linux'
        shell: bash
        run: |
          CLEAN_PATH=$(echo "$PATH" | tr ':' '\n' | grep -v '\.cargo/bin' | tr '\n' ':' | sed 's/:$//')
          echo "PATH=$CLEAN_PATH" >> $GITHUB_ENV
      - uses: tomphp/github-actions/checkout-rust-project@v0.8.1
      - uses: actions/download-artifact@v8
        with:
          name: bumped-files
          path: bumped-files
      - run: mv bumped-files/Cargo.* .
        shell: bash
      - uses: tomphp/github-actions/determine-binary-name@v0.8.1
        id: get-binary-name
        with:
          name: specdown
      - name: Build release version
        run: make "$BINARY_NAME"
        env:
          BINARY_NAME: ${{ steps.get-binary-name.outputs.name }}
        shell: bash
      - name: Move binary to upload location
        env:
          BINARY_NAME: ${{ steps.get-binary-name.outputs.name }}
          BINARY_NAME_WITH_ARCH: ${{ steps.get-binary-name.outputs.name-with-arch }}
        run: mv "$BINARY_NAME" "$BINARY_NAME_WITH_ARCH"
        shell: bash
      - uses: actions/upload-artifact@v7
        name: Store built binary version
        with:
          name: bins-${{ matrix.os }}
          path: ${{ steps.get-binary-name.outputs.name-with-arch }}
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: macos-26-intel
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: windows-latest

  tag-and-release:
    needs:
      - build-binaries
    uses: armakuni/github-actions/.github/workflows/tag-and-release.yml@v0.19.14
    with:
      download-artifacts: true
      release-artifacts: ./bins-*/*

  publish-website:
    needs:
      - tag-and-release
    uses: ./.github/workflows/publish-website.yml

  generate-formula:
    needs:
      - tag-and-release
    name: Generate Homebrew homebrew
    runs-on: ubuntu-latest
    steps:
      - id: get_repository_name
        name: Work out repository name
        run: echo "REPOSITORY_NAME=$(echo "$GITHUB_REPOSITORY" |
          awk -F / '{print $2}' | sed -e "s/:refs//")" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: actions/checkout@v7
        name: Checkout this repository
        with:
          path: main-repo
          ref: v${{ needs.tag-and-release.outputs.current-version }}

      - uses: actions/checkout@v7
        with:
          repository: specdown/homebrew-repo
          path: homebrew-repo
          ref: main
          token: ${{ secrets.COMMITTER_TOKEN }}
        name: Checkout the custom tap

      - run: |
          sha256sum -b main-repo/README.md | awk '{ print $1 }' > "./hash"
          echo "SHA256=$( cat hash )" >> "$GITHUB_OUTPUT"
        id: readme
        shell: bash
        name: Calculate the readme hash

      - name: Calculate macOS ARM binary hash
        id: macos_arm
        shell: bash
        env:
          GIT_REPO: ${{ github.repository }}
          GIT_TAG: v${{ needs.tag-and-release.outputs.current-version }}
        run: |
          curl -Lo binary "https://github.com/$GIT_REPO/releases/download/$GIT_TAG/specdown-aarch64-apple-darwin"
          echo "SHA256=$(sha256sum -b binary | awk '{ print $1 }')" >> "$GITHUB_OUTPUT"

      - name: Calculate macOS Intel binary hash
        id: macos_x86
        shell: bash
        env:
          GIT_REPO: ${{ github.repository }}
          GIT_TAG: v${{ needs.tag-and-release.outputs.current-version }}
        run: |
          curl -Lo binary "https://github.com/$GIT_REPO/releases/download/$GIT_TAG/specdown-x86_64-apple-darwin"
          echo "SHA256=$(sha256sum -b binary | awk '{ print $1 }')" >> "$GITHUB_OUTPUT"

      - name: Calculate Linux x86_64 binary hash
        id: linux_x86
        shell: bash
        env:
          GIT_REPO: ${{ github.repository }}
          GIT_TAG: v${{ needs.tag-and-release.outputs.current-version }}
        run: |
          curl -Lo binary "https://github.com/$GIT_REPO/releases/download/$GIT_TAG/specdown-x86_64-unknown-linux-gnu"
          echo "SHA256=$(sha256sum -b binary | awk '{ print $1 }')" >> "$GITHUB_OUTPUT"

      - name: Calculate Linux ARM binary hash
        id: linux_arm
        shell: bash
        env:
          GIT_REPO: ${{ github.repository }}
          GIT_TAG: v${{ needs.tag-and-release.outputs.current-version }}
        run: |
          curl -Lo binary "https://github.com/$GIT_REPO/releases/download/$GIT_TAG/specdown-aarch64-unknown-linux-gnu"
          echo "SHA256=$(sha256sum -b binary | awk '{ print $1 }')" >> "$GITHUB_OUTPUT"

      - uses: cuchi/jinja2-action@v1.3.0
        with:
          template: main-repo/homebrew/formula.rb.j2
          output_file: formula.rb
          variables: |
            github_repo=${{ github.repository }}
            git_tag=v${{ needs.tag-and-release.outputs.current-version }}
            version=${{ needs.tag-and-release.outputs.current-version }}
            macos_arm_sha=${{ steps.macos_arm.outputs.SHA256 }}
            macos_x86_sha=${{ steps.macos_x86.outputs.SHA256 }}
            linux_x86_sha=${{ steps.linux_x86.outputs.SHA256 }}
            linux_arm_sha=${{ steps.linux_arm.outputs.SHA256 }}
            readme_sha=${{ steps.readme.outputs.SHA256 }}
        name: Generate the template

      - shell: bash
        name: Open a PR on the custom tap repository
        run: |
          git config --global user.email "noreply@specdown.io"
          git config --global user.name "Specdown"
          
          VERSION="${GIT_TAG#refs/tags/}"
          git switch -c "$REPOSITORY_NAME-$VERSION"

          cp ../formula.rb "Formula/$REPOSITORY_NAME.rb"

          git add "Formula/$REPOSITORY_NAME.rb"
          git commit -m "fix: Update $REPOSITORY_NAME to $VERSION"
          git push origin "$REPOSITORY_NAME-$VERSION"
          gh pr create --label releases --base main --fill
        working-directory: homebrew-repo
        env:
          REPOSITORY_NAME: ${{ steps.get_repository_name.outputs.REPOSITORY_NAME }}
          GIT_TAG: v${{ needs.tag-and-release.outputs.current-version }}
          GITHUB_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
