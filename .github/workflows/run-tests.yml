on:
  workflow_call:
    outputs:
      will-bump:
        value: ${{ jobs.check-conventional-commits.outputs.will-bump }}
      bump-version:
        value: ${{ jobs.check-conventional-commits.outputs.bump-version }}

jobs:
  check-conventional-commits:
    uses: armakuni/github-actions/.github/workflows/check-conventional-commits.yml@v0.19.14

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: tomphp/github-actions/checkout-rust-project@v0.8.0
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit check cargo packages
        run: cargo audit

  cargo-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: macos-26-intel
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: windows-latest
    steps:
      - name: "workaround: Add rustup bin to PATH"
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH
          brew --prefix rustup 2>/dev/null && echo "$(brew --prefix rustup)/bin" >> $GITHUB_PATH || true
      - name: "workaround: Remove cached x86_64 rustup from PATH on ARM Linux"
        if: runner.arch == 'ARM64' && runner.os == 'Linux'
        shell: bash
        run: |
          CLEAN_PATH=$(echo "$PATH" | tr ':' '\n' | grep -v '\.cargo/bin' | tr '\n' ':' | sed 's/:$//')
          echo "PATH=$CLEAN_PATH" >> $GITHUB_ENV
      - uses: tomphp/github-actions/checkout-rust-project@v0.8.0
      - name: Rename wsl bash
        if: runner.os == 'Windows'
        run: |
          takeown /F 'C:\Windows\System32\bash.exe'
          icacls 'C:\Windows\System32\bash.exe' /grant administrators:F
          ren 'C:\Windows\System32\bash.exe' wsl-bash.exe
      - run: make test

  lint:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    steps:
      - uses: tomphp/github-actions/checkout-rust-project@v0.8.0
        with:
          rust-components: rustfmt, clippy
      - name: Run checks
        run: make check
      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@1.0.17
        if: matrix.os == 'ubuntu-latest'
